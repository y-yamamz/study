spring:
  datasource:
    url: jdbc:mysql://192.168.0.3:3306/tododb?useSSL=false&serverTimezone=Asia/Tokyo
    #url: jdbc:mysql://mysql84:3306/tododb?useSSL=false&serverTimezone=Asia/Tokyo
    username: yama
    password: yama
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:/sql/**/*.xml
  type-aliases-package: com.example.backend.db.entity
  configuration:
    map-underscore-to-camel-case: true

server:
  address: 0.0.0.0
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: always

jwt:
  secret: todoapp-jwt-secret-key-change-in-production-32chars!!
  access-token-expiry: 3600000
  refresh-token-expiry: 604800000

logging:
  level:
    root: INFO
    #org.springframework: DEBUG
    #org.mybatis: DEBUG
